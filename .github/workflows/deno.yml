# workflow name
name: alioss

# 在main分支上有push命令时触发该流程
on:
    schedule:
  # 定时任务，在每天的5点推送天气信息到邮箱
    - cron: '0 00 * * *'

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
          

            - name: Setup Node.js 10.x
              uses: actions/setup-node@master
              with:
                  node-version: '10.x'

            
            - name: setup aliyun oss
              uses: manyuanrong/setup-ossutil@master
              with:
                  endpoint: oss-cn-shanghai.aliyuncs.com
                  access-key-id: LTAI4FvobtZQeBPoGuo323vn # 刚刚配置过的AccessKeyId
                  access-key-secret: eCZrLHc96MZKkG5fUFjDIdKvXp4u2i # 刚刚配置过的AccessKeySecret
            - name: cp files to aliyun
              run: ossutil cp -rf public oss://mumukehao/ # 将xxxxx改为创建的Bucket名称，-rf表示覆盖
